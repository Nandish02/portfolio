titles:
  # Title patterns — case-insensitive substring
  must_match_any:
    - intern
    - internship
    - summer 2027
    - "co-op"
    - coop
  # If true, the title must also match a tech/SWE/data keyword (drops HR / marketing /
  # sales / law / consulting intern roles before AI scoring → saves API cost).
  require_tech_relevant: true

# Season targeting — push Summer 2027 to the top; downrank older seasons.
season:
  target: "summer 2027"
  accept_explicit:
    - "summer 2027"
    - "summer'27"
    - "summer 27"
    - "sum 27"
    - "su27"
    - "may 2027"
    - "june 2027"
    - "july 2027"
    - "aug 2027"
    - "2027 intern"
    - "intern 2027"
    - "futureforce summer 2027"
  reject_explicit:
    # if the JD/title clearly says ONLY these seasons, drop the row
    - "summer 2024"
    - "summer 2025"
    - "fall 2024"
    - "fall 2025"
    - "spring 2025"
    - "spring 2026"
    - "winter 2025"
    - "winter 2026"
  # Accept-by-default for ambiguous postings (most "Software Engineer Intern" with no year)
  accept_if_ambiguous: true
  must_not_match_any:
    - phd intern only
    - graduate research only
    - clearance required
    - top secret
    - "ts/sci"
    - manager
    - director
    - principal
    # trades / non-SWE intern roles
    - electrician
    - plumber
    - hvac
    - welder
    - mechanic apprentice
    - carpenter
    - construction
    - warehouse
    - delivery
    - driver
    - sales development intern
    - sales intern
    - marketing intern
    - hr intern
    - "people, intern"
    - operations apprentice

